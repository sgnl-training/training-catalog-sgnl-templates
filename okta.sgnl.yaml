# Okta Configuration YAML for DS2.0
displayName: "Okta"
icon: |
  
description: "Okta as a System of Record"
hostname: "{{Input Required: yourOktaSubDomain}}.okta.com"
defaultSyncFrequency: HOURLY
defaultSyncMinInterval: 1
defaultApiCallFrequency: SECONDLY
defaultApiCallMinInterval: 1
type: "Okta-1.0.1"
# Example Config:
# {"requestTimeoutSeconds": 10, "apiVersion": "v1"}
adapterConfig: "eyJyZXF1ZXN0VGltZW91dFNlY29uZHMiOiAxMCwgImFwaVZlcnNpb24iOiAidjEifQ=="
# All auth mechanisms specified below must be supported by the specified Adapter.
auth:
  - oAuth2ClientCredentials:
      clientId: "{{Input Required: Client-ID}}"
      tokenUrl: "https://{{Input Required: yourOktaSubDomain}}.okta.com/oauth2/v1/token"
      authStyle: AutoDetect
      clientSecret: "{{Input Required: Client-Secret}}"
      scope: "okta.users.read okta.groups.read"
  - bearer:
      authToken: "SSWS {{Input Required: token}}"
entities:
  User:
    displayName: User
    externalId: User
    description: User entity in Okta
    pageSize: 100
    pagesOrderedById: false
    attributes:
      - name: id
        externalId: id
        type: String
        indexed: true
        uniqueId: true
      - name: status
        externalId: status
        type: String
      - name: created
        externalId: created
        type: DateTime
      - name: activated
        externalId: activated
        type: DateTime
      - name: statusChanged
        externalId: statusChanged
        type: DateTime
      - name: lastLogin
        externalId: lastLogin
        type: DateTime
      - name: lastUpdated
        externalId: lastUpdated
        type: DateTime
      - name: passwordChanged
        externalId: passwordChanged
        type: DateTime
      - name: transitioningToStatus
        externalId: transitioningToStatus
        type: String
      - name: type__id
        externalId: type__id
        type: String
      - name: login
        externalId: profile__login
        type: String
      - name: email
        externalId: profile__email
        type: String
        indexed: true
      - name: secondEmail
        externalId: profile__secondEmail
        type: String
      - name: firstName
        externalId: profile__firstName
        type: String
      - name: lastName
        externalId: profile__lastName
        type: String
      - name: middleName
        externalId: profile__middleName
        type: String
      - name: honorificPrefix
        externalId: profile__honorificPrefix
        type: String
      - name: honorificSuffix
        externalId: profile__honorificSuffix
        type: String
      - name: title
        externalId: profile__title
        type: String
      - name: displayName
        externalId: profile__displayName
        type: String
      - name: nickName
        externalId: profile__nickName
        type: String
      - name: profileUrl
        externalId: profile__profileUrl
        type: String
      - name: primaryPhone
        externalId: profile__primaryPhone
        type: String
      - name: mobilePhone
        externalId: profile__mobilePhone
        type: String
      - name: streetAddress
        externalId: profile__streetAddress
        type: String
      - name: city
        externalId: profile__city
        type: String
      - name: state
        externalId: profile__state
        type: String
      - name: zipCode
        externalId: profile__zipCode
        type: String
      - name: countryCode
        externalId: profile__countryCode
        type: String
      - name: postalAddress
        externalId: profile__postalAddress
        type: String
      - name: preferredLanguage
        externalId: profile__preferredLanguage
        type: String
      - name: locale
        externalId: profile__locale
        type: String
      - name: timezone
        externalId: profile__timezone
        type: String
      - name: userType
        externalId: profile__userType
        type: String
      - name: employeeNumber
        externalId: profile__employeeNumber
        type: String
      - name: costCenter
        externalId: profile__costCenter
        type: String
      - name: organization
        externalId: profile__organization
        type: String
      - name: division
        externalId: profile__division
        type: String
      - name: department
        externalId: profile__department
        type: String
      - name: managerId
        externalId: profile__managerId
        type: String
        indexed: true
      - name: manager
        externalId: profile__manager
        type: String
  Group:
    displayName: Group
    externalId: Group
    description: Group entity in Okta
    pageSize: 100
    pagesOrderedById: false
    attributes:
      - name: id
        externalId: id
        type: String
        indexed: true
        uniqueId: true
      - name: created
        externalId: created
        type: DateTime
      - name: lastUpdated
        externalId: lastUpdated
        type: DateTime
      - name: lastMembershipUpdated
        externalId: lastMembershipUpdated
        type: DateTime
      - name: objectClass
        externalId: objectClass
        type: String
        list: true
      - name: type
        externalId: type
        type: String
      - name: name
        externalId: profile__name
        type: String
        indexed: true
      - name: description
        externalId: profile__description
        type: String
  GroupMember:
    displayName: GroupMember
    externalId: GroupMember
    description: Group Member entity in Okta
    pageSize: 100
    pagesOrderedById: false
    attributes:
      - name: id
        externalId: id
        type: String
        indexed: true
        uniqueId: true
      - name: groupId
        externalId: groupId
        type: String
        indexed: true
      - name: userId
        externalId: userId
        type: String
        indexed: true

relationships:
  Member:
    name: Member
    displayName: Member
    fromAttribute: GroupMember.userId
    toAttribute: User.id
  GroupMembership:
    name: GroupMembership
    displayName: Group Membership
    fromAttribute: GroupMember.groupId
    toAttribute: Group.id
  UserManager:
    name: Manager
    displayName: User Manager
    fromAttribute: User.profile__managerId
    toAttribute: User.id
  UserMemberGroup:
    name: Group
    displayName: User Member Group
    path:
      - relationship: Member
        direction: Backward
      - relationship: GroupMembership
        direction: Forward
