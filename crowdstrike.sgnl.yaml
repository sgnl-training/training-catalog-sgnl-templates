displayName: "CrowdStrike"
icon: 
description: "CrowdStrike as a System of Record"
address: "none"
defaultSyncFrequency: HOURLY
defaultSyncMinInterval: 1
defaultApiCallFrequency: SECONDLY
defaultApiCallMinInterval: 1
type: "S3-1.0.0"
# Example Config:
# {
#     "apiVersion": "v1",
#     "archived": false,
#     "enabled": true
# }
adapterConfig: "ewogICJyZWdpb24iOiAidXMtZWFzdC0yIiwKICAiYnVja2V0IjogInNnbmwtdHJhaW5pbmctc29yLWluZ2VzdCIsCiAgInByZWZpeCI6ICJjcm93ZHN0cmlrZSIKfQ=="
auth:
  - basic:
      username: "{{Input Required: Username}}"
      password: "{{Input Required: Password}}"
entities:
  User:
    displayName: User
    externalId: user
    description: User represents a user in the CrowdStrike platform. This is fetched from the Identity Protection module.
    syncFrequency: MINUTELY
    syncMinInterval: 1
    apiCallFrequency: SECONDLY
    apiCallMinInterval: 1
    pageSize: 100
    pagesOrderedById: false
    attributes:
      - name: entityId
        externalId: entityId
        type: String
        indexed: true
        uniqueId: true
      - name: primaryDisplayName
        externalId: primaryDisplayName
        type: String
      - name: secondaryDisplayName
        externalId: secondaryDisplayName
        type: String
      - name: archived
        externalId: archived
        type: Bool
      - name: creationTime
        externalId: creationTime
        type: DateTime
      - name: earliestSeenTraffic
        externalId: earliestSeenTraffic
        type: DateTime
      - name: hasADDomainAdminRole
        externalId: hasADDomainAdminRole
        type: Bool
      - name: impactScore
        externalId: impactScore
        type: Double
      - name: inactive
        externalId: inactive
        type: Bool
      - name: learned
        externalId: learned
        type: Bool
      - name: markTime
        externalId: markTime
        type: DateTime
      - name: mostRecentActivity
        externalId: mostRecentActivity
        type: DateTime
      - name: riskScore
        externalId: riskScore
        type: Double
      - name: riskScoreSeverity
        externalId: riskScoreSeverity
        type: String
      - name: riskScoreWithoutLinkedAccounts
        externalId: riskScoreWithoutLinkedAccounts
        type: Double
      - name: shared
        externalId: shared
        type: Bool
      - name: stale
        externalId: stale
        type: Bool
      - name: watched
        externalId: watched
        type: Bool
      - name: type
        externalId: type
        type: String
      - name: upn
        externalId: $.accounts[0].upn
        description: ""
        type: String
        indexed: true
        uniqueId: false
      - name: objectSid
        externalId: $.accounts[0].objectSid
        description: ""
        type: String
        indexed: true
        uniqueId: false
        list: false
        attributeAlias: UserObjectSid
      - name: samAccountName
        externalId: $.accounts[0].samAccountName
        description: ""
        type: String
        indexed: true
        uniqueId: false
        list: false
